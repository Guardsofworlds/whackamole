<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Whack-A-Mole — Versus</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060810;--surf1:#0b0f18;--surf2:#111926;--surf3:#161f2e;
  --border:rgba(45,65,85,0.6);--border-hi:rgba(60,90,120,0.8);
  --text:#8a9fb8;--text-bright:#b8ccd8;--text-hi:#d4e4ef;
  --accent:#3a8ab4;--gold:#c8901a;--red:#9a2828;--red-bright:#c03535;
  --green:#37895a;--pink:#d04a7a;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;overflow:hidden;cursor:crosshair;user-select:none}
canvas#bg{position:fixed;inset:0;z-index:0}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 3px)}

/* ── LOBBY (initial setup) ── */
#lobbyMP{
  position:fixed;inset:0;z-index:5;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;padding:24px;
}
#lobbyMP.hidden{display:none}
.lobby-title{
  font-family:'Rajdhani',sans-serif;font-size:2.4rem;font-weight:700;
  letter-spacing:6px;text-transform:uppercase;color:var(--text-hi);
  text-shadow:0 0 24px rgba(58,138,180,0.4);
}
.lobby-sub{font-size:0.7rem;letter-spacing:4px;color:var(--accent);text-transform:uppercase;opacity:0.8}
.lobby-card{
  background:var(--surf1);border:1px solid var(--border-hi);border-radius:8px;
  padding:28px 36px;max-width:480px;width:90%;
  display:flex;flex-direction:column;gap:14px;
  position:relative;overflow:hidden;
}
.lobby-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,var(--accent),transparent)}
.choice-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.choice-btn{
  background:var(--surf2);border:1px solid var(--border);border-radius:6px;
  padding:18px 12px;cursor:pointer;transition:all 0.2s;
  font-family:'Rajdhani',sans-serif;color:var(--text-bright);
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.choice-btn:hover{border-color:var(--accent);background:var(--surf3);transform:translateY(-2px)}
.choice-btn.active{border-color:var(--accent);background:rgba(58,138,180,0.15)}
.choice-icon{font-size:1.6rem;color:var(--accent)}
.choice-label{font-size:0.78rem;font-weight:600;letter-spacing:2px;text-transform:uppercase}
.choice-desc{font-size:0.65rem;color:var(--text);opacity:0.7;font-family:'Inter',sans-serif}

.code-display{
  background:#000;border:1px dashed var(--accent);border-radius:6px;
  padding:18px;text-align:center;
}
.code-label{font-size:0.6rem;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:6px}
.code-value{
  font-family:'Rajdhani',sans-serif;font-size:2.2rem;font-weight:700;
  letter-spacing:6px;color:var(--text-hi);
  text-shadow:0 0 12px rgba(58,138,180,0.5);
}
.code-copy-hint{font-size:0.6rem;color:var(--text);opacity:0.6;margin-top:6px}

.code-input-row{display:flex;gap:8px}
.code-input{
  flex:1;background:#000;border:1px solid var(--border);border-radius:4px;
  padding:12px 14px;font-family:'Rajdhani',sans-serif;font-size:1.4rem;
  letter-spacing:6px;color:var(--text-hi);text-transform:uppercase;
  text-align:center;outline:none;
}
.code-input:focus{border-color:var(--accent);box-shadow:0 0 12px rgba(58,138,180,0.3)}
.lobby-btn{
  font-family:'Rajdhani',sans-serif;font-size:0.85rem;font-weight:600;
  letter-spacing:3px;text-transform:uppercase;
  padding:12px 24px;border-radius:4px;cursor:pointer;border:none;
  background:var(--accent);color:var(--bg);transition:all 0.15s;
}
.lobby-btn:hover{background:#4a9dc8;box-shadow:0 0 16px rgba(58,138,180,0.5)}
.lobby-btn.secondary{background:var(--surf3);color:var(--text);border:1px solid var(--border)}
.lobby-btn.secondary:hover{border-color:var(--accent);color:var(--text-bright)}
.lobby-btn:disabled{opacity:0.4;cursor:not-allowed}
.lobby-status{
  text-align:center;font-size:0.78rem;color:var(--text);letter-spacing:1px;
  padding:10px;font-family:'Rajdhani',sans-serif;
}
.lobby-status.waiting::after{content:'';animation:dotPulse 1.5s infinite}
@keyframes dotPulse{0%{content:'.'}33%{content:'..'}66%{content:'...'}}
.lobby-status.error{color:var(--red-bright)}
.lobby-status.ok{color:var(--green)}

.back-link{
  position:absolute;top:18px;left:24px;z-index:10;
  font-family:'Rajdhani',sans-serif;font-size:0.78rem;letter-spacing:2px;
  color:var(--text);text-decoration:none;text-transform:uppercase;
  padding:8px 16px;border:1px solid var(--border);border-radius:4px;
  background:var(--surf1);transition:all 0.15s;
}
.back-link:hover{border-color:var(--accent);color:var(--text-bright)}

/* ── COUNTDOWN ── */
#countdown{
  position:fixed;inset:0;z-index:80;display:none;
  align-items:center;justify-content:center;
  background:rgba(4,6,12,0.85);backdrop-filter:blur(8px);
}
#countdown.show{display:flex}
.cd-num{
  font-family:'Rajdhani',sans-serif;font-size:8rem;font-weight:700;
  color:var(--text-hi);text-shadow:0 0 40px var(--accent);
  animation:cdPop 1s ease-out;
}
@keyframes cdPop{0%{transform:scale(2);opacity:0}30%{transform:scale(1);opacity:1}100%{transform:scale(0.5);opacity:0}}

/* ── ARENA (gameplay) ── */
#arena{
  position:relative;z-index:2;display:none;
  height:100vh;flex-direction:column;padding:10px;gap:8px;
}
#arena.show{display:flex}
.top-bar{
  display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;
  background:var(--surf1);border:1px solid var(--border);border-radius:6px;
  padding:8px 14px;flex-shrink:0;position:relative;overflow:hidden;
}
.top-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,var(--accent),transparent);opacity:0.5}
.player-tag{display:flex;align-items:center;gap:10px}
.player-tag.right{justify-content:flex-end}
.tag-label{
  font-family:'Rajdhani',sans-serif;font-size:0.7rem;letter-spacing:3px;
  text-transform:uppercase;color:var(--text);
}
.tag-score{
  font-family:'Rajdhani',sans-serif;font-size:1.6rem;font-weight:700;
  letter-spacing:1px;
}
.tag-score.you{color:var(--accent)}
.tag-score.opp{color:var(--pink)}
.timer-block{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:0 18px;border-left:1px solid var(--border);border-right:1px solid var(--border);
}
.timer-label{font-size:0.55rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--text);opacity:0.55}
.timer-num{font-family:'Rajdhani',sans-serif;font-size:1.6rem;font-weight:700;color:var(--text-hi)}

.arenas{
  flex:1;display:grid;grid-template-columns:1fr 1fr;gap:10px;min-height:0;
}
.side{
  background:var(--surf1);border:1px solid var(--border);border-radius:6px;
  display:flex;flex-direction:column;padding:10px;position:relative;overflow:hidden;
}
.side::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,var(--side-color,var(--accent)),transparent);opacity:0.5}
.side.you{--side-color:var(--accent)}
.side.opp{--side-color:var(--pink)}
.side-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 4px 8px;border-bottom:1px solid var(--border);margin-bottom:10px;
}
.side-name{font-family:'Rajdhani',sans-serif;font-size:0.85rem;font-weight:600;letter-spacing:3px;text-transform:uppercase}
.side.you .side-name{color:var(--accent)}
.side.opp .side-name{color:var(--pink)}
.side-stats{display:flex;gap:14px;font-family:'Rajdhani',sans-serif;font-size:0.7rem;color:var(--text)}
.side-stats span b{color:var(--text-hi);font-weight:600}

.grid{
  flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  gap:10px;
}
.hole{
  position:relative;border-radius:50%;overflow:visible;
  background:radial-gradient(ellipse at 38% 30%,#1a2230 0%,#0d141e 40%,#07090e 75%,#020305 100%);
  border:2px solid #1a2535;
  box-shadow:inset 0 6px 20px rgba(0,0,0,0.95),inset 0 -2px 8px rgba(0,0,0,0.7),
    0 0 0 1px rgba(30,50,70,0.4),0 2px 6px rgba(0,0,0,0.6);
}
.hole::after{content:'';position:absolute;inset:8%;border-radius:50%;
  box-shadow:inset 0 4px 12px rgba(0,0,0,0.8);pointer-events:none}

.target{
  position:absolute;bottom:-115%;left:50%;transform:translateX(-50%) scale(0.85);
  width:70px;height:84px;
  transition:bottom 0.3s cubic-bezier(.175,.885,.32,1.275),transform 0.3s;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,0.9));cursor:pointer;
}
.target.up{bottom:5%;transform:translateX(-50%) scale(1)}
.target svg{width:100%;height:100%}
.target.hit-flash{animation:hitFlash 0.12s ease-out}
@keyframes hitFlash{0%{filter:brightness(4) saturate(0)}100%{filter:brightness(1) saturate(1) drop-shadow(0 4px 10px rgba(0,0,0,0.9))}}

.opp-pulse{
  position:absolute;inset:0;border-radius:50%;pointer-events:none;
  border:2px solid var(--pink);opacity:0;
  animation:oppPulse 0.6s ease-out;
}
@keyframes oppPulse{0%{opacity:0.9;transform:scale(1)}100%{opacity:0;transform:scale(1.5)}}

#vfx{position:fixed;inset:0;z-index:10;pointer-events:none}
.laser-ray{position:absolute;pointer-events:none;transform-origin:0 50%;height:2px;border-radius:1px;animation:laserFade 0.22s ease-out forwards}
@keyframes laserFade{0%{opacity:1;transform:scaleY(1)}100%{opacity:0;transform:scaleY(0.5)}}
.hit-burst{position:absolute;pointer-events:none;width:50px;height:50px;margin:-25px 0 0 -25px;border-radius:50%;animation:burstOut 0.35s ease-out forwards}
@keyframes burstOut{0%{transform:scale(0.2);opacity:1}60%{transform:scale(1.2);opacity:0.6}100%{transform:scale(1.7);opacity:0}}
.score-pop{position:absolute;pointer-events:none;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;letter-spacing:1px;text-shadow:0 2px 6px rgba(0,0,0,0.9);animation:popUp 0.8s cubic-bezier(.175,.885,.32,1.275) forwards;white-space:nowrap}
@keyframes popUp{0%{transform:translateY(0) scale(0.6);opacity:1}60%{transform:translateY(-30px) scale(1);opacity:1}100%{transform:translateY(-60px) scale(0.85);opacity:0}}

/* ── END SCREEN ── */
#endMP{
  position:fixed;inset:0;z-index:90;display:none;
  align-items:center;justify-content:center;
  background:rgba(4,6,12,0.95);backdrop-filter:blur(20px);
}
#endMP.show{display:flex}
.end-card{
  background:var(--surf1);border:1px solid var(--border-hi);border-radius:8px;
  max-width:520px;width:90%;overflow:hidden;
  animation:cardIn 0.5s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes cardIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.end-header{padding:20px 28px 16px;background:var(--surf2);border-bottom:1px solid var(--border);position:relative}
.end-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,var(--accent),transparent);opacity:0.4}
.end-result{font-family:'Rajdhani',sans-serif;font-size:2rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;text-align:center}
.end-result.win{color:var(--gold);text-shadow:0 0 20px rgba(200,144,26,0.4)}
.end-result.lose{color:var(--red-bright);text-shadow:0 0 20px rgba(192,53,53,0.4)}
.end-result.tie{color:var(--text-hi)}
.end-sub{font-size:0.7rem;letter-spacing:2px;color:var(--text);text-align:center;margin-top:4px;text-transform:uppercase}
.end-scores{
  padding:24px 28px;display:grid;grid-template-columns:1fr auto 1fr;gap:18px;align-items:center;
}
.end-side{display:flex;flex-direction:column;align-items:center;gap:4px}
.end-side-label{font-size:0.65rem;letter-spacing:2.5px;color:var(--text);opacity:0.7;text-transform:uppercase}
.end-side-score{font-family:'Rajdhani',sans-serif;font-size:3rem;font-weight:700;letter-spacing:1px}
.end-side.you .end-side-score{color:var(--accent)}
.end-side.opp .end-side-score{color:var(--pink)}
.end-vs{font-family:'Rajdhani',sans-serif;font-size:1.4rem;color:var(--text);opacity:0.5;letter-spacing:3px}
.end-actions{padding:14px 28px;background:var(--surf2);display:flex;gap:10px;justify-content:flex-end}
.end-btn{
  font-family:'Rajdhani',sans-serif;font-size:0.78rem;font-weight:600;
  letter-spacing:2.5px;text-transform:uppercase;
  padding:10px 18px;border-radius:3px;cursor:pointer;border:none;
}
.end-btn.primary{background:var(--accent);color:var(--bg)}
.end-btn.primary:hover{background:#4a9dc8}
.end-btn.secondary{background:var(--surf3);color:var(--text);border:1px solid var(--border)}
.end-btn.secondary:hover{border-color:var(--accent);color:var(--text-bright)}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="scanlines"></div>
<div id="vfx"></div>

<a href="index.html" class="back-link">← Back</a>

<!-- ── LOBBY ── -->
<div id="lobbyMP">
  <div class="lobby-sub">Multiplayer · Versus Mode</div>
  <h1 class="lobby-title">Choose Side</h1>

  <div class="lobby-card">
    <div class="choice-row">
      <button class="choice-btn" id="hostBtn">
        <div class="choice-icon">⚐</div>
        <div class="choice-label">Create Room</div>
        <div class="choice-desc">Host a match · share code</div>
      </button>
      <button class="choice-btn" id="joinBtn">
        <div class="choice-icon">⌖</div>
        <div class="choice-label">Join Room</div>
        <div class="choice-desc">Enter friend's code</div>
      </button>
    </div>

    <!-- Host view -->
    <div id="hostView" style="display:none">
      <div class="code-display">
        <div class="code-label">Your Room Code</div>
        <div class="code-value" id="codeValue">— — — — — —</div>
        <div class="code-copy-hint" id="copyHint">Click to copy</div>
      </div>
      <div class="lobby-status waiting" id="hostStatus" style="margin-top:10px">Waiting for opponent</div>
    </div>

    <!-- Join view -->
    <div id="joinView" style="display:none">
      <div class="code-input-row">
        <input class="code-input" id="codeInput" maxlength="6" placeholder="CODE"/>
        <button class="lobby-btn" id="connectBtn">Connect</button>
      </div>
      <div class="lobby-status" id="joinStatus" style="margin-top:10px"></div>
    </div>
  </div>
</div>

<!-- ── COUNTDOWN ── -->
<div id="countdown"><div class="cd-num" id="cdNum">3</div></div>

<!-- ── ARENA ── -->
<div id="arena">
  <div class="top-bar">
    <div class="player-tag">
      <div class="tag-label">You</div>
      <div class="tag-score you" id="youScore">0</div>
    </div>
    <div class="timer-block">
      <div class="timer-label">Time</div>
      <div class="timer-num" id="timerNum">60</div>
    </div>
    <div class="player-tag right">
      <div class="tag-score opp" id="oppScore">0</div>
      <div class="tag-label">Opponent</div>
    </div>
  </div>
  <div class="arenas">
    <div class="side you">
      <div class="side-header">
        <div class="side-name">▶ Your Field</div>
        <div class="side-stats"><span>Hits <b id="youHits">0</b></span><span>×<b id="youCombo">1</b></span></div>
      </div>
      <div class="grid" id="gridYou"></div>
    </div>
    <div class="side opp">
      <div class="side-header">
        <div class="side-name">◀ Opponent's Field</div>
        <div class="side-stats"><span>Hits <b id="oppHits">0</b></span><span>×<b id="oppCombo">1</b></span></div>
      </div>
      <div class="grid" id="gridOpp"></div>
    </div>
  </div>
</div>

<!-- ── END ── -->
<div id="endMP">
  <div class="end-card">
    <div class="end-header">
      <div class="end-result" id="endResult">VICTORY</div>
      <div class="end-sub" id="endSub">Match concluded</div>
    </div>
    <div class="end-scores">
      <div class="end-side you">
        <div class="end-side-label">You</div>
        <div class="end-side-score" id="endYou">0</div>
      </div>
      <div class="end-vs">VS</div>
      <div class="end-side opp">
        <div class="end-side-label">Opponent</div>
        <div class="end-side-score" id="endOpp">0</div>
      </div>
    </div>
    <div class="end-actions">
      <button class="end-btn secondary" onclick="window.location.href='index.html'">← Lobby</button>
      <button class="end-btn primary" onclick="location.reload()">↺ New Match</button>
    </div>
  </div>
</div>

<script>
// ─── SVG LIBRARY (reused from game.html, simplified) ─────────────
const SVGS = {
  trooper:`<svg viewBox="0 0 100 120"><defs><radialGradient id="th" cx="38%" cy="28%"><stop offset="0%" stop-color="#e8e8e8"/><stop offset="100%" stop-color="#888"/></radialGradient><filter id="tff"><feDropShadow dx="0" dy="3" stdDeviation="2" flood-opacity="0.6"/></filter></defs><g filter="url(#tff)"><ellipse cx="50" cy="82" rx="28" ry="26" fill="url(#th)"/><path d="M29 70 Q50 65 71 70 L69 84 Q50 89 31 84 Z" fill="#ccc"/><ellipse cx="50" cy="33" rx="25" ry="25" fill="url(#th)"/><path d="M25 33 Q50 7 75 33" fill="none" stroke="#ddd" stroke-width="2.5"/><rect x="25" y="31" width="50" height="11" rx="2.5" fill="#111"/><rect x="45" y="31" width="10" height="11" fill="#080808"/><ellipse cx="35.5" cy="36.5" rx="8" ry="5" fill="#1a1a1a"/><ellipse cx="64.5" cy="36.5" rx="8" ry="5" fill="#1a1a1a"/><rect x="31" y="104" width="15" height="13" rx="3.5" fill="#aaa"/><rect x="54" y="104" width="15" height="13" rx="3.5" fill="#aaa"/></g></svg>`,

const ENEMIES = [
  {id:'trooper',  name:'Stormtrooper',pts:10,hp:1,color:'#b8b8b8',rare:0.22},
  {id:'clone',    name:'Clone',       pts:10,hp:1,color:'#88aad8',rare:0.22},
  {id:'xenomorph',name:'Xenomorph',   pts:20,hp:1,color:'#44aa44',rare:0.16},
  {id:'r2d2',     name:'R2-D2',       pts:20,hp:1,color:'#4488ee',rare:0.14},
  {id:'yoda',     name:'Yoda',        pts:30,hp:2,color:'#88c855',rare:0.10},
  {id:'boba',     name:'Boba Fett',   pts:30,hp:2,color:'#78a048',rare:0.08},
  {id:'predator', name:'Predator',    pts:40,hp:2,color:'#d8a838',rare:0.05},
  {id:'vader',    name:'Darth Vader', pts:50,hp:3,color:'#cc3333',rare:0.03},
];

// ─── ROOM CODE GENERATION ────────────────────────────────────────
const CODE_PREFIX = 'whackamole-vs-';
function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // unambiguous
  let s=''; for(let i=0;i<6;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}

// ─── DOM REFS ────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const lobbyMP=$('lobbyMP'), arena=$('arena'), endMP=$('endMP'), countdown=$('countdown');
const hostBtn=$('hostBtn'), joinBtn=$('joinBtn');
const hostView=$('hostView'), joinView=$('joinView');
const codeValue=$('codeValue'), copyHint=$('copyHint');
const codeInput=$('codeInput'), connectBtn=$('connectBtn');
const hostStatus=$('hostStatus'), joinStatus=$('joinStatus');
const youScoreEl=$('youScore'), oppScoreEl=$('oppScore');
const youHitsEl=$('youHits'), oppHitsEl=$('oppHits');
const youComboEl=$('youCombo'), oppComboEl=$('oppCombo');
const timerNum=$('timerNum'), cdNum=$('cdNum');
const gridYou=$('gridYou'), gridOpp=$('gridOpp'), vfx=$('vfx');

// ─── BUILD GRIDS ─────────────────────────────────────────────────
function buildGrid(grid){
  grid.innerHTML='';
  const holes=[];
  for(let i=0;i<9;i++){
    const h=document.createElement('div'); h.className='hole';
    const t=document.createElement('div'); t.className='target';
    h.appendChild(t); grid.appendChild(h);
    holes.push({hole:h, target:t});
  }
  return holes;
}
const youHoles = buildGrid(gridYou);
const oppHoles = buildGrid(gridOpp);

// ─── AUDIO ────────────────────────────────────────────────────────
const audio = new (window.AudioContext||window.webkitAudioContext)();
function playTone(freq,type,dur,vol=0.06){
  try{
    const o=audio.createOscillator(),g=audio.createGain();
    o.type=type;o.frequency.value=freq;
    o.frequency.exponentialRampToValueAtTime(10,audio.currentTime+dur);
    g.gain.setValueAtTime(vol,audio.currentTime);
    g.gain.linearRampToValueAtTime(0,audio.currentTime+dur);
    o.connect(g);g.connect(audio.destination);
    o.start();o.stop(audio.currentTime+dur);
  }catch(e){}
}
const playLaser=()=>playTone(760,'sawtooth',0.14);
const playHit  =()=>playTone(200,'square',0.20,0.08);
const playPop  =()=>playTone(360,'sine',0.08,0.03);

// ─── VFX ──────────────────────────────────────────────────────────
function spawnLaser(fx,fy,tx,ty,color){
  const dx=tx-fx,dy=ty-fy,len=Math.hypot(dx,dy),ang=Math.atan2(dy,dx)*180/Math.PI;
  const r=document.createElement('div');
  r.className='laser-ray';
  r.style.cssText=`left:${fx}px;top:${fy}px;width:${len}px;transform:rotate(${ang}deg);
    background:linear-gradient(to right,#fff,${color},transparent);
    box-shadow:0 0 6px ${color},0 0 12px ${color}`;
  vfx.appendChild(r); setTimeout(()=>r.remove(),250);
}
function spawnBurst(x,y,color){
  const b=document.createElement('div'); b.className='hit-burst';
  b.style.cssText=`left:${x}px;top:${y}px;background:radial-gradient(circle,${color},transparent)`;
  vfx.appendChild(b); setTimeout(()=>b.remove(),360);
}
function spawnPop(x,y,pts,color){
  const p=document.createElement('div'); p.className='score-pop';
  p.style.cssText=`left:${x-16}px;top:${y-10}px;color:${color}`;
  p.textContent='+'+pts;
  vfx.appendChild(p); setTimeout(()=>p.remove(),800);
}

// ─── GAME STATE ──────────────────────────────────────────────────
let isHost=false, peer=null, conn=null;
let gameRunning=false;
let myScore=0, myHits=0, myCombo=1;
let oppScoreState=0, oppHitsState=0, oppComboState=1;
let cursorX=window.innerWidth/2, cursorY=window.innerHeight/2;
window.addEventListener('mousemove',e=>{ cursorX=e.clientX; cursorY=e.clientY; });

// Spawn helpers
function pickEnemy(rng){
  const r=rng(); let acc=0;
  for(const e of ENEMIES){ acc+=e.rare; if(r<acc) return e; }
  return ENEMIES[0];
}
function makeRng(seed){
  let s=seed>>>0;
  return ()=>{
    s = (s*1664525+1013904223)>>>0;
    return s/4294967296;
  };
}

// Both sides use the same seeded sequence for synchronized spawns
let spawnRng=null, oppSpawnRng=null;

function spawnOnSide(holes, rng, isOpp){
  const free=holes.filter(h=>!h.target.classList.contains('up'));
  if(!free.length) return;
  const idx = Math.floor(rng()*free.length);
  const slot = free[idx];
  const enemy = pickEnemy(rng);
  slot.target.innerHTML = SVGS[enemy.id];
  slot.target.dataset.type=enemy.id;
  slot.target.dataset.pts=enemy.pts;
  slot.target.dataset.hp=enemy.hp;
  slot.target.dataset.color=enemy.color;
  slot.target.classList.add('up');
  if(!isOpp) playPop();
  setTimeout(()=>{
    if(slot.target.classList.contains('up')){
      slot.target.classList.remove('up');
      if(!isOpp){ myCombo=1; updateUI(); }
    }
  }, 1500);
}

// ─── CLICK ON YOUR FIELD ─────────────────────────────────────────
gridYou.addEventListener('mousedown', e=>{
  if(!gameRunning) return;
  const t=e.target.closest('.target');
  if(!t||!t.classList.contains('up')) return;
  audio.resume();
  const rect=t.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const color=t.dataset.color||'#3a8ab4';
  spawnLaser(cursorX,cursorY,cx,cy,color);
  playLaser();

  let hp=parseInt(t.dataset.hp)-1;
  t.dataset.hp=hp;
  t.classList.add('hit-flash');
  setTimeout(()=>t.classList.remove('hit-flash'),130);

  if(hp<=0){
    const pts=parseInt(t.dataset.pts)*myCombo;
    myScore+=pts; myHits++; myCombo=Math.min(myCombo+1,8);
    t.classList.remove('up');
    spawnBurst(cx,cy,color);
    spawnPop(cx,cy,pts,color);
    playHit();
    updateUI();
    // Tell opponent we got a kill — they'll mirror visually
    sendMsg({type:'kill', score:myScore, hits:myHits, combo:myCombo, holeIdx:youHoles.indexOf(youHoles.find(h=>h.target===t)), color});
  }
});

// ─── OPPONENT-SIDE VISUAL UPDATES ────────────────────────────────
function showOppKill(holeIdx, color){
  // Briefly retract opponent target on that hole and pulse
  const slot = oppHoles[holeIdx];
  if(!slot) return;
  if(slot.target.classList.contains('up')){
    slot.target.classList.remove('up');
  }
  const pulse = document.createElement('div');
  pulse.className='opp-pulse';
  pulse.style.borderColor=color;
  slot.hole.appendChild(pulse);
  setTimeout(()=>pulse.remove(),650);
  const r=slot.hole.getBoundingClientRect();
  spawnBurst(r.left+r.width/2, r.top+r.height/2, color);
}

// ─── UI UPDATES ──────────────────────────────────────────────────
function updateUI(){
  youScoreEl.textContent=myScore; youHitsEl.textContent=myHits; youComboEl.textContent=myCombo;
  oppScoreEl.textContent=oppScoreState; oppHitsEl.textContent=oppHitsState; oppComboEl.textContent=oppComboState;
}

// ─── NETWORK MESSAGE HANDLING ────────────────────────────────────
function sendMsg(obj){ if(conn && conn.open) try{ conn.send(obj); }catch(e){} }

function handleMsg(m){
  if(!m || !m.type) return;
  switch(m.type){
    case 'ready':
      // Opponent connected and ready
      if(isHost){
        // Host kicks off countdown
        const startAt = Date.now()+3500;
        const seed = (Math.random()*1e9)|0;
        sendMsg({type:'start', startAt, seed});
        beginCountdown(startAt, seed);
      }
      break;
    case 'start':
      beginCountdown(m.startAt, m.seed);
      break;
    case 'kill':
      oppScoreState=m.score; oppHitsState=m.hits; oppComboState=m.combo;
      showOppKill(m.holeIdx, m.color);
      updateUI();
      break;
    case 'end':
      // Opponent's final score (for tiebreak/sync)
      oppScoreState=m.score; oppHitsState=m.hits;
      updateUI();
      break;
  }
}

// ─── COUNTDOWN + GAME START ──────────────────────────────────────
function beginCountdown(startAt, seed){
  lobbyMP.classList.add('hidden');
  arena.classList.add('show');
  countdown.classList.add('show');

  let n=3;
  cdNum.textContent=n;
  const tick = setInterval(()=>{
    const remaining = Math.max(0, startAt-Date.now());
    const sec = Math.ceil(remaining/1000);
    if(sec<=0){
      cdNum.textContent='GO';
      clearInterval(tick);
      setTimeout(()=>{
        countdown.classList.remove('show');
        startMatch(seed);
      }, 500);
    } else {
      cdNum.textContent = sec;
    }
  }, 100);
}

let matchTimer=null, spawnLoop=null, oppSpawnLoop=null, matchTimeLeft=60;
function startMatch(seed){
  myScore=0; myHits=0; myCombo=1;
  oppScoreState=0; oppHitsState=0; oppComboState=1;
  matchTimeLeft=60;
  updateUI();
  timerNum.textContent=matchTimeLeft;
  gameRunning=true;

  // Both players use SAME seed → identical spawn schedules on each side
  spawnRng = makeRng(seed);
  oppSpawnRng = makeRng(seed+1);

  const spawnDelay=()=>650+Math.random()*350;
  let nextOwn=Date.now()+spawnDelay(), nextOpp=Date.now()+spawnDelay();
  spawnLoop = setInterval(()=>{
    const now=Date.now();
    if(now>=nextOwn){ spawnOnSide(youHoles, spawnRng, false); nextOwn=now+spawnDelay(); }
    if(now>=nextOpp){ spawnOnSide(oppHoles, oppSpawnRng, true); nextOpp=now+spawnDelay(); }
  }, 90);

  matchTimer = setInterval(()=>{
    matchTimeLeft--;
    timerNum.textContent=matchTimeLeft;
    if(matchTimeLeft<=0) endMatch();
  }, 1000);
}

function endMatch(){
  gameRunning=false;
  clearInterval(matchTimer); clearInterval(spawnLoop);
  matchTimer=null; spawnLoop=null;
  // Retract everything
  [...youHoles,...oppHoles].forEach(h=>h.target.classList.remove('up'));
  // Send final score so opp has authoritative number
  sendMsg({type:'end', score:myScore, hits:myHits});
  setTimeout(showEnd, 600);
}

function showEnd(){
  $('endYou').textContent=myScore;
  $('endOpp').textContent=oppScoreState;
  const r = $('endResult'), s=$('endSub');
  if(myScore > oppScoreState){
    r.textContent='VICTORY'; r.className='end-result win';
    s.textContent='You won the match.';
  } else if(myScore < oppScoreState){
    r.textContent='DEFEAT'; r.className='end-result lose';
    s.textContent='Opponent took the match.';
  } else {
    r.textContent='DRAW'; r.className='end-result tie';
    s.textContent='Tied score — well fought.';
  }
  endMP.classList.add('show');
}

// ─── PEER NETWORKING (PeerJS) ────────────────────────────────────
function setStatus(el, text, cls){
  el.textContent=text;
  el.className='lobby-status' + (cls?' '+cls:'');
}

// ── HOST FLOW ──
hostBtn.addEventListener('click', ()=>{
  hostBtn.classList.add('active'); joinBtn.classList.remove('active');
  hostView.style.display='block'; joinView.style.display='none';

  const code = genCode();
  codeValue.textContent = code;
  setStatus(hostStatus,'Connecting to network', 'waiting');

  if(peer){ try{peer.destroy();}catch(e){} }
  peer = new Peer(CODE_PREFIX+code, { debug:1 });

  peer.on('open', ()=>{
    setStatus(hostStatus,'Waiting for opponent','waiting');
  });
  peer.on('connection', c => {
    conn = c;
    isHost = true;
    setStatus(hostStatus,'Opponent connected — preparing','ok');
    conn.on('open', ()=>{
      // Wait briefly then signal ready
      setTimeout(()=>sendMsg({type:'ready'}), 300);
    });
    conn.on('data', handleMsg);
    conn.on('close', ()=>{ if(gameRunning) endMatch(); });
  });
  peer.on('error', err=>{
    console.warn(err);
    if(err.type==='unavailable-id'){
      // very unlucky collision — regenerate
      hostBtn.click();
    } else {
      setStatus(hostStatus,'Network error: '+err.type,'error');
    }
  });
});

codeValue.addEventListener('click', ()=>{
  const code = codeValue.textContent;
  if(code && code !== '— — — — — —'){
    navigator.clipboard.writeText(code).then(()=>{
      copyHint.textContent='Copied!';
      setTimeout(()=>copyHint.textContent='Click to copy', 1500);
    }).catch(()=>{});
  }
});

// ── JOIN FLOW ──
joinBtn.addEventListener('click', ()=>{
  joinBtn.classList.add('active'); hostBtn.classList.remove('active');
  joinView.style.display='block'; hostView.style.display='none';
  codeInput.focus();
});

codeInput.addEventListener('input', e=>{
  e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6);
});

connectBtn.addEventListener('click', tryConnect);
codeInput.addEventListener('keydown', e=>{ if(e.key==='Enter') tryConnect(); });

function tryConnect(){
  const code = codeInput.value.trim().toUpperCase();
  if(code.length<4){ setStatus(joinStatus,'Enter a valid code','error'); return; }
  setStatus(joinStatus,'Connecting','waiting');
  connectBtn.disabled=true;

  if(peer){ try{peer.destroy();}catch(e){} }
  peer = new Peer(); // random ID for joiner

  peer.on('open', ()=>{
    conn = peer.connect(CODE_PREFIX+code, { reliable:true });
    isHost = false;
    conn.on('open', ()=>{
      setStatus(joinStatus,'Connected — waiting for host','ok');
    });
    conn.on('data', handleMsg);
    conn.on('close', ()=>{
      if(gameRunning) endMatch();
      else setStatus(joinStatus,'Disconnected','error');
    });
    conn.on('error', err=>{
      setStatus(joinStatus,'Connection error','error');
      connectBtn.disabled=false;
    });
    // Failsafe: if 'open' doesn't fire within 8s, surface error
    setTimeout(()=>{
      if(!conn.open){
        setStatus(joinStatus,'Could not reach host — check the code','error');
        connectBtn.disabled=false;
      }
    }, 8000);
  });
  peer.on('error', err=>{
    console.warn(err);
    if(err.type==='peer-unavailable'){
      setStatus(joinStatus,'Room not found — check the code','error');
    } else {
      setStatus(joinStatus,'Network error: '+err.type,'error');
    }
    connectBtn.disabled=false;
  });
}

// ─── BACKGROUND CANVAS (light, same vibe as game.html) ───────────
const bgC=$('bg'), bgX=bgC.getContext('2d');
let stars=[];
function resizeBg(){ bgC.width=innerWidth; bgC.height=innerHeight; }
function initStars(){
  stars=[];
  for(let i=0;i<140;i++) stars.push({
    x:Math.random()*bgC.width, y:Math.random()*bgC.height,
    r:Math.random()*1.1+0.2, sp:Math.random()*0.15+0.04,
    tw:Math.random()*Math.PI*2, tws:Math.random()*0.018+0.008,
    c:['#9aaabb','#aabbcc','#778899','#ccddee'][~~(Math.random()*4)]
  });
}
function drawBg(){
  bgX.clearRect(0,0,bgC.width,bgC.height);
  [[0.2,0.2,250,'rgba(20,40,60,0.06)'],[0.8,0.8,200,'rgba(30,50,70,0.05)'],
   [0.5,0.5,320,'rgba(10,20,35,0.04)']].forEach(([cx,cy,r,c])=>{
    const g=bgX.createRadialGradient(bgC.width*cx,bgC.height*cy,0,bgC.width*cx,bgC.height*cy,r);
    g.addColorStop(0,c); g.addColorStop(1,'transparent');
    bgX.fillStyle=g; bgX.fillRect(0,0,bgC.width,bgC.height);
  });
  for(const s of stars){
    s.tw+=s.tws;
    bgX.globalAlpha=0.2+0.45*Math.abs(Math.sin(s.tw));
    bgX.fillStyle=s.c;
    bgX.beginPath(); bgX.arc(s.x,s.y,s.r,0,Math.PI*2); bgX.fill();
    s.y+=s.sp; if(s.y>bgC.height){ s.y=0; s.x=Math.random()*bgC.width; }
  }
  bgX.globalAlpha=1;
  requestAnimationFrame(drawBg);
}
resizeBg(); initStars(); drawBg();
window.addEventListener('resize',()=>{ resizeBg(); initStars(); });
</script>
